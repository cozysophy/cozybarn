<!DOCTYPE html>
<html>
	<head>
<style>
	    html, body { margin:0; height:100%; background:#000000; }
    .screen { width:480px; height:800px; margin:0 auto; padding:12px; box-sizing:border-box; }
    @media (max-width:480px), (max-height:800px) { .screen { width:100vw; height:100vh; } }

    .btn {
	background-color:rgb(255, 204, 0);
	width:160px;
	height:160px;
	font-size:60pt;
	font-weight:bold;
	font-family:courier;
	}
    .img-btn {
        padding: 0;
        border: none;
        background: none;
        }

    .img-btn img {
        display: block;
        }

    #playb {
            width:auto;
            height:auto;
            display:block;
	   }
    #song {
	    background-color:rgb(35, 26, 52);
	    font-size:40pt;
	    color:white;
	    font-weight:bold;
	    font-family: courier;
	    overflow:hidden;
	    white-space:nowrap;
	    width:480px;
    	}		

    #songText {
    display: inline-block;
    animation: scrollSong 30s linear infinite;
}

@keyframes scrollSong {
    0% { transform: translateX(0); }
    60% { transform: translateX(0); }
    100%{ transform: translateX(-100%); }
}
	    
    #album {
	    background-color:rgb(239, 128, 237);
	    font-size:20pt;
		color:black;
	    font-weight:bold;
	    font-family: courier;
    }
    #artist {
	    background-color:yellow;
	    font-size:20pt;
		color:black;
	    font-weight:bold;
	    font-family:courier;
    }
    #albumImage {
	    display:block;
	    width:450px;
	    height:auto;
	    margin:0 auto;
    }

    .btn:active {
	background-color:red;
    }

    .row {
         display: flex;
         justify-content: space-between;
         align-items: center;
         }

    .row img {
         width: 480px;  
         height: auto;
         }

    .slidercontainer {
	
	}
    .slider {
     -webkit-appearance: none;
  width: 480px;
  height: 25px;
  background: #4C0080;
  outline: none;
  -webkit-transition: .2s;
  transition: opacity .2s;
  }
    .slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 25px;
  height: 25px;
  background: #FF00E8;
  cursor: pointer;
}
    ::-webkit-scrollbar {
    display: none;
}
</style>
	</head>
	<body>

		<br>
		
		<img id="albumImage" ><br>
		<div id="song"><span id="songText"></span></div><br>
		<div id="artist"></div>
		<div id="album"></div>
          <div class="row">
		<button id="rewindbutton" class="img-btn"> <img id="playb" src="/static/rewind.gif"></button>
		<button id="playbutton" class="img-btn"> <img id="playb" src="static/play.gif"> </button>
		<button id="pausebutton" class="img-btn"><img id="playb" src="/static/pause.gif"></button>
		<button id="forwardbutton" class="img-btn"> <img id="playb" src="/static/forward.gif"> </button>
          </div>
<br>
              
                <input class="slider" type=range id="volumeslider" min="0" max="100">
	  
<br>
		<button id="restartspotify"> RESTART </button>
		<button id="backbutton">BACK</button>
<script>
// <- slash slash only works inside javascript

    async function updateNowPlaying() {  //async means the system can continue to run while the function waits

        const now_playing = await fetch("/spotify/now-playing")
	jsonplaying = await now_playing.json()
        console.log(jsonplaying)
		
	const albumImgRes = jsonplaying.albumart;	
	document.getElementById("albumImage").src = albumImgRes;

	const songRes = jsonplaying.song;
    	document.getElementById("songText").textContent = songRes;	//.textContent is the text between
								//the <span> struct for the ID'song'
    
        const albumRes = jsonplaying.album;
        document.getElementById("album").textContent = albumRes;

        const artistRes = jsonplaying.artist; //fetch is making an HTTP request, and getting response object
        document.getElementById("artist").textContent = artistRes;      // in return

	const volumeInit = jsonplaying.volume;
	document.getElementById("volumeslider").value = volumeInit;        
  }



    updateNowPlaying();               // run once immediately to get instant loading of song playing when opened
  setInterval(updateNowPlaying, 5000); // then every second

document.getElementById("rewindbutton").onclick = function() { fetch("/api/spotify/rewind"); };
document.getElementById("playbutton").onclick = function() { fetch("/api/spotify/play"); };
document.getElementById("pausebutton").onclick = function() { fetch("/api/spotify/pause"); };
document.getElementById("forwardbutton").onclick = function() { fetch("/api/spotify/forward"); };
document.getElementById("backbutton").onclick = function() {window.location.href = "/"};

const slider = document.getElementById("volumeslider");
slider.addEventListener("change", function () {
     var value = slider.value;
     fetch("/spotify/volume/" + value, {method: "POST" });
     });

</script>

	</body>
</html>
